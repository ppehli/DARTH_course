name: Publish Quarto website to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # R is not needed for the current static code examples, but keeping it here
      # makes the workflow ready if you later add evaluated R chunks.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages for evaluated R chunks
        run: |
          install.packages(c("rmarkdown", "knitr"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Render Quarto website
        uses: quarto-dev/quarto-actions/render@v2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
